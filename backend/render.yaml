services:
  - type: web
    name: politia-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POLITIA_DATABASE_URL
        sync: false
      - key: POLITIA_DEBUG
        value: "false"
      - key: POLITIA_CORS_ORIGINS
        value: '["https://politia.vercel.app","http://localhost:3000"]'
    plan: free
    region: oregon
