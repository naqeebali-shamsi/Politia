version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: politia_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-politia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-politia_password}
      POSTGRES_DB: politia_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
